<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyTV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>EasyTV<small style="font-weight:normal;font-size:0.7rem;color:#aaa">edit:43</small></h1>
    <div id="user-info"></div>
  </header>

  <main>
    <section id="login-section" hidden>
      <button id="login-btn">Log in with Trakt</button>
      <div id="login-status"></div>
    </section>

    <section id="watchlist-section" hidden>
      <div id="watchlist-header">
        <h2>Shows I'm Watching</h2>
        <label>Sort: <select id="sort-select">
          <option value="alpha">Alphabetical</option>
          <option value="watched">Last watched</option>
          <option value="added">Last added</option>
        </select></label>
      </div>
      <div id="watchlist-status"></div>
      <div id="shows-grid"></div>
    </section>
  </main>

  <dialog id="login-code-dialog">
    <p>Enter this code on trakt.tv:</p>
    <p id="dialog-code"></p>
    <p id="dialog-copied" hidden>[copied to clipboard]</p>
    <div id="dialog-buttons">
      <button id="dialog-ok">Open Trakt</button>
      <button id="dialog-cancel">Cancel</button>
    </div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
