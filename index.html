<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EasyTV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>EasyTV [5] <small style="font-weight:normal;font-size:0.7rem;color:#aaa">edit:17</small></h1>
    <div id="user-info"></div>
  </header>

  <main>
    <section id="login-section" hidden>
      <button id="login-btn">Log in with Trakt</button>
      <div id="device-code-display" hidden></div>
      <div id="login-status"></div>
    </section>

    <section id="watchlist-section" hidden>
      <h2>Shows I'm Watching</h2>
      <div id="watchlist-status"></div>
      <div id="shows-grid"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
